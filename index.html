<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduNexus – University Learning Platform</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EduNexus" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />

  <link rel="stylesheet" href="css/styles.css" />
  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════
       LOGIN SCREEN
  ════════════════════════════════════════ -->
  <div id="login-screen">
    <div class="login-box">
      <div class="logo">
        <h1>EduNexus</h1>
        <p>Connected University Learning Platform</p>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@university.edu" autocomplete="email"
               onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')Auth.login()" />
      </div>
      <div id="login-error" style="display:none;color:var(--red);font-size:.84rem;margin-bottom:10px;padding:10px 12px;background:rgba(255,107,107,.1);border-radius:8px;border:1px solid rgba(255,107,107,.3)"></div>
      <button class="btn" id="login-btn" onclick="Auth.login()">Sign In</button>

      <div style="display:flex;align-items:center;gap:10px;margin:20px 0 14px">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <div style="font-size:.75rem;color:var(--text2);white-space:nowrap">try a demo role</div>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <div class="demo-roles">
        <button class="demo-btn" onclick="Auth.demoLogin('student')">🎓 Student</button>
        <button class="demo-btn" onclick="Auth.demoLogin('facilitator')">👨‍🏫 Facilitator</button>
        <button class="demo-btn" onclick="Auth.demoLogin('uni-admin')">🏛️ Uni Admin</button>
        <button class="demo-btn" onclick="Auth.demoLogin('school-director')">📊 Director</button>
        <button class="demo-btn" onclick="Auth.demoLogin('ministry')">🏛 Ministry</button>
        <button class="demo-btn" onclick="Auth.demoLogin('super-admin')">⚙️ System</button>
      </div>
    </div>
  </div>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="Nav.closeSidebar()"></div>

  <!-- ═══════════════════════════════════════
       APP SHELL
  ════════════════════════════════════════ -->
  <div id="app">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <h2>EduNexus</h2>
        <span id="uni-name-label">University of Technology</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-user">
        <div class="user-card">
          <div class="avatar" id="sidebar-avatar">S</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-uname">Alex Johnson</div>
            <div class="user-role" id="sidebar-urole">Student · CS Dept</div>
          </div>
          <button class="logout-btn" onclick="Auth.logout()" title="Logout">⏻</button>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="hamburger" onclick="Nav.toggleSidebar()" aria-label="Open menu">☰</button>
          <h2 id="page-title">Dashboard</h2>
        </div>
        <div class="topbar-right">
          <div class="notif-btn" onclick="Notifications.toggle()" style="position:relative">
            🔔 <div class="badge" id="notif-badge">3</div>
          </div>
          <div style="font-size:.82rem;color:var(--text2)" id="topbar-role-label">Student</div>
        </div>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       MODAL
  ════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Modal</div>
        <button class="modal-close" onclick="Utils.closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       NOTIFICATION PANEL
  ════════════════════════════════════════ -->
  <div class="notif-panel" id="notif-panel">
    <div class="notif-head">
      <span>Notifications</span>
      <button onclick="Notifications.clearAll()" style="background:none;border:none;color:var(--text2);font-size:.78rem;cursor:pointer">Clear all</button>
    </div>
    <div id="notif-list"></div>
  </div>

  <!-- ═══════════════════════════════════════
       SCRIPTS — ORDER MATTERS
  ════════════════════════════════════════ -->
  <!-- Core -->
  <script src="js/db.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/syslog.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/app.js"></script>

  <!-- Components -->
  <script src="components/file-upload.js"></script>
  <script src="components/chat.js"></script>
  <script src="components/reviews.js"></script>

  <!-- Student Views -->
  <script src="views/student/dashboard.js"></script>
  <script src="views/student/courses.js"></script>
  <script src="views/student/materials.js"></script>
  <script src="views/student/exams.js"></script>
  <script src="views/student/grades.js"></script>
  <script src="views/student/ai-advisor.js"></script>

  <!-- Facilitator Views -->
  <script src="views/facilitator/dashboard.js"></script>
  <script src="views/facilitator/materials.js"></script>
  <script src="views/facilitator/exam-create.js"></script>
  <script src="views/facilitator/grade-papers.js"></script>
  <script src="views/facilitator/gradebook.js"></script>

  <!-- Admin Views -->
  <script src="views/admin/dashboard.js"></script>
  <script src="views/admin/students.js"></script>
  <script src="views/admin/facilitators.js"></script>
  <script src="views/admin/departments.js"></script>
  <script src="views/admin/analytics.js"></script>

  <!-- Super Admin Views -->
  <script src="views/super-admin/dashboard.js"></script>
  <script src="views/super-admin/universities.js"></script>
  <script src="views/super-admin/admins.js"></script>
  <script src="views/super-admin/syslog.js"></script>

  <!-- Ministry Views -->
  <script src="views/ministry/dashboard.js"></script>
  <script src="views/ministry/school-analysis.js"></script>
  <script src="views/ministry/dept-analysis.js"></script>
  <script src="views/ministry/course-analysis.js"></script>
  <script src="views/ministry/complaints.js"></script>
  <script src="views/ministry/trends.js"></script>

  <!-- New Feature Views (Attendance, Assignments, Announcements) -->
  <script src="views/facilitator/attendance.js"></script>
  <script src="views/student/attendance.js"></script>
  <script src="views/facilitator/assignments.js"></script>
  <script src="views/student/assignments.js"></script>
  <script src="views/announcements.js"></script>

  <!-- Document Requests -->
  <script src="views/admin/doc-requests.js"></script>
  <script src="views/student/doc-requests.js"></script>

  <!-- Timetable (shared, all roles) -->
  <script src="views/timetable.js"></script>

  <!-- Notification Centre -->
  <script src="views/notif-center.js"></script>

  <!-- Direct Messages -->
  <script src="views/messages.js"></script>

  <!-- Counseling & Wellbeing -->
  <script src="views/counseling.js"></script>

  <!-- School Director Views -->
  <script src="views/school-director/dashboard.js"></script>
  <script src="views/school-director/departments.js"></script>
  <script src="views/school-director/staff.js"></script>
  <script src="views/school-director/students.js"></script>
  <script src="views/school-director/reviews.js"></script>
  <script src="views/school-director/reports.js"></script>

  <!-- PWA Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Registered, scope:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>

</body>
</html>
